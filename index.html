<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>BRC7 | Obfuscator</title>
<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}
h1 {
    margin: 20px;
}
.container {
    display: flex;
    gap: 20px;
    width: 90%;
}
textarea {
    width: 45%;
    height: 400px;
    background: #020617;
    color: #38bdf8;
    border: none;
    padding: 10px;
    border-radius: 10px;
}
.center {
    display: flex;
    flex-direction: column;
    justify-content: center;
}
button {
    margin: 10px;
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}
button:hover {
    background: #0ea5e9;
}
.actions {
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>BRC7 | Obfuscator</h1>

<div class="container">
    <textarea id="input" placeholder="Masukkan kode asli disini"></textarea>

    <div class="center">
        <button onclick="obfuscate()">Obfuscate</button>
    </div>

    <textarea id="output" readonly></textarea>
</div>

<div class="actions">
    <button onclick="copyText()">Copy</button>
    <button onclick="downloadText()">Download</button>
</div>

<script>
function randomName(len=8){
    let chars="abcdefghijklmnopqrstuvwxyz";
    let name="_0x";
    for(let i=0;i<len;i++){
        name += chars[Math.floor(Math.random()*chars.length)];
    }
    return name;
}

function encodeString(str){
    let result=[];
    for(let i=0;i<str.length;i++){
        result.push(str.charCodeAt(i)+Math.floor(Math.random()*5));
    }
    return result.join(",");
}

function buildLoader(encoded){
    let key = Math.floor(Math.random()*5);

    return `
local function dec(t)
    local s=""
    for i,v in ipairs(t) do
        s = s .. string.char(v-${key})
    end
    return s
end

local data = {${encoded}}
local src = dec(data)
loadstring(src)()
`;
}

function obfuscate(){
    let code = document.getElementById("input").value;
    if(!code) return alert("Isi dulu bego 😹");

    // escape string
    code = code.replace(/\\/g,"\\\\").replace(/`/g,"\\`");

    // encode
    let encoded = encodeString(code);

    // build loader
    let result = buildLoader(encoded);

    // layer tambahan random junk
    let junk = `
local ${randomName()} = ${Math.floor(Math.random()*9999)}
local ${randomName()} = function() return ${Math.floor(Math.random()*9999)} end
`;

    document.getElementById("output").value = junk + result;
}

function copyText(){
    let out = document.getElementById("output");
    out.select();
    document.execCommand("copy");
}

function downloadText(){
    let text = document.getElementById("output").value;
    let blob = new Blob([text], {type: "text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "obfuscated.lua";
    a.click();
}
</script>

</body>
</html>
